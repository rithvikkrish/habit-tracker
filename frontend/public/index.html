<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f0c29" />
    <meta name="description" content="Rithvik's Habit Tracker - Build habits. Get things done." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Rithvik's | Habit Tracker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0f0c29; }
      #initial-loader {
        position: fixed; inset: 0;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        display: flex; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      .spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255,255,255,0.1);
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) { loader.style.opacity = '0'; setTimeout(function() { loader.style.display = 'none'; }, 500); }
        }, 500);
      });
    </script>
  </body>
</html>
